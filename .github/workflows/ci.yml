name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      # Versions are pinned to match .tool-versions so CI and local dev agree.
      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.4.2"
          elixir-version: "1.19.5"

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Check for unused deps in mix.lock
        run: mix deps.unlock --check-unused

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Credo (strict)
        run: mix credo --strict

      - name: Sobelow security scan
        run: mix sobelow --config

      # GHSA-52mm-h59v-f3c7 (earmark XSS) has no upstream patch and is mitigated
      # by html_sanitize_ex on the render path; ignored until a fix ships.
      - name: Dependency vulnerability audit
        run: mix deps.audit --ignore-advisory-ids GHSA-52mm-h59v-f3c7

      - name: Run tests
        run: mix test

  # Dialyzer is currently non-blocking: there are pre-existing :unmatched_return
  # findings to clear before it can gate merges. Flip continue-on-error to false
  # once those are resolved.
  dialyzer:
    name: Dialyzer (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.4.2"
          elixir-version: "1.19.5"

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-dialyzer-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-dialyzer-

      # The PLT is expensive to build; cache it keyed on the dep + OTP versions.
      - name: Cache Dialyzer PLT
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-plt-

      - name: Install dependencies
        run: mix deps.get

      - name: Build PLT
        run: mix dialyzer --plt

      - name: Run Dialyzer
        run: mix dialyzer --format short
