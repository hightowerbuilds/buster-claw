name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      # Versions are pinned to match .tool-versions so CI and local dev agree.
      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.4.2"
          elixir-version: "1.19.5"

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Check for unused deps in mix.lock
        run: mix deps.unlock --check-unused

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Credo (strict)
        run: mix credo --strict

      # Every ./buster-claw example in README/docs/user-guide must reference a
      # real CLI verb or catalog command — renaming a verb without updating the
      # docs fails here instead of rotting the front door.
      - name: Docs drift check
        run: scripts/check_docs_drift.sh

      - name: Sobelow security scan
        run: mix sobelow --config

      # GHSA-52mm-h59v-f3c7 (earmark XSS) has no upstream patch and is mitigated
      # by html_sanitize_ex on the render path; ignored until a fix ships.
      - name: Dependency vulnerability audit
        run: mix deps.audit --ignore-advisory-ids GHSA-52mm-h59v-f3c7

      - name: Run tests
        run: mix test

  # The desktop shell gate (shell-rebuild Phase 1). Runs on macOS because the
  # shipped code path IS the objc/WKWebView path — an ubuntu runner would test
  # the ffi stubs. Steps mirror scripts/check_rust.sh exactly; the toolchain is
  # pinned by desktop/tauri/rust-toolchain.toml (rustup auto-installs it).
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: macos-14
    defaults:
      run:
        working-directory: desktop/tauri
    steps:
      - uses: actions/checkout@v4

      # Triggers rustup's auto-install of the pinned toolchain + components
      # before rust-cache computes its cache key.
      - name: Install pinned toolchain
        run: rustup show

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/tauri

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests (incl. ACL lockstep guard)
        run: cargo test

  # The JS pure-logic tests (URL heuristics, ANSI parsing, tab state) existed
  # before this job but nothing enforced them — same disease the rust job cures.
  js:
    name: JS (bun test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Run bun tests
        run: bun test assets/js

  # Dialyzer is currently non-blocking: there are pre-existing :unmatched_return
  # findings to clear before it can gate merges. Flip continue-on-error to false
  # once those are resolved.
  dialyzer:
    name: Dialyzer (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.4.2"
          elixir-version: "1.19.5"

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-dialyzer-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-dialyzer-

      # The PLT is expensive to build; cache it keyed on the dep + OTP versions.
      # (_plts moved out of priv/ on 07-18 so the caches stop shipping in the
      # release bundle.)
      - name: Cache Dialyzer PLT
        uses: actions/cache@v4
        with:
          path: _plts
          key: ${{ runner.os }}-plt-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-plt-

      - name: Install dependencies
        run: mix deps.get

      - name: Build PLT
        run: mix dialyzer --plt

      - name: Run Dialyzer
        run: mix dialyzer --format short
