<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Buster Claw</title>
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center;
        background: #0b0f14; color: #d8e0ea;
        font-family: -apple-system, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      }
      .wrap { text-align: center; }
      .title { font-size: 18px; font-weight: 600; margin: 0 0 6px; }
      .sub { font-size: 13px; color: #8a96a6; margin: 0; }
      .spinner {
        width: 28px; height: 28px; margin: 0 auto 14px;
        border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.12);
        border-top-color: #6aa6ff;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="spinner" aria-hidden="true"></div>
      <p class="title">Starting Buster Claw</p>
      <p class="sub">Bringing the local runtime online…</p>
    </div>
  </body>
</html>
