<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Buster Claw — Startup Error</title>
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center;
        background: #0b0f14; color: #d8e0ea;
        font-family: -apple-system, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      }
      .wrap { max-width: 520px; padding: 32px; }
      .title { font-size: 18px; font-weight: 600; margin: 0 0 8px; color: #ff8a8a; }
      .body { font-size: 14px; line-height: 1.55; color: #c1cad6; margin: 0 0 16px; }
      code {
        display: block; background: #11161d; color: #9cd4ff;
        padding: 10px 12px; border-radius: 6px; font-size: 12.5px;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p class="title">Buster Claw failed to start the local runtime.</p>
      <p class="body">
        The Phoenix release did not become healthy within the startup window.
        Check the logs for the cause:
      </p>
      <code>~/Library/Application Support/BusterClaw/logs/release.stderr.log</code>
    </div>
  </body>
</html>
